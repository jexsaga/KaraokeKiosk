<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./css/main.css" rel="stylesheet">
        <title>Karaokie Kiosk</title>
    </head>
    <body>
        <header class="site-header">
            <div id="top-bar">
                <button>FX</button>
                <div id="center-buttons">
                    <button id="musicBtn">music</button>
                    <button id="menuBtn">menu</button>
                </div>
                <button>SOS</button>
            </div>
            <!-- <div id="fx-overlay">
                <p>Effects</p>
                <button id="fx1">Effect1</button>
                <button id="fx2">Effect2</button>
                <button id="fx3">Effect3</button>
            </div>
            <div id="sos-overlay">
                <p>Do you need help?</p>
                <button id="sos-yes">Yes</button>
                <button id="sos-no">No</button>
            </div> -->
        </header>
         <div id="main-content">
            <div id ="music-tab" >
                <div id="music-block-titles">
                    <h1>Queue</h1>
                    <h1>Catalog</h1>
                </div>
                <div id="music-blocks">
                    <div id="queue-block"></div>
                    <div id="catalog-block">
                        <div id="search-container">
                            <input id="searchbar" 
                                onkeyup="searchSongs()" 
                                type="text" name="search" 
                                placeholder="Search songs..">
                            <button id="clear-btn" onclick="clearSearch()">✕</button>
                        </div>
                        <!-- <button id="genre-back">back</button> -->
                        <div id="recs"></div>
                    </div>
                </div>
            </div>
            <!-- to display food tab correctly need to set display to flex and not block -->
            <div id ="food-tab" style="display:none">
                <div id="food-block-titles">
                    <button>Food</button>
                    <button>Drinks</button>
                    <button>Appetizers</button>
                    <button>Specials</button>
                </div>
                <div id="food-block">
                    <!-- exmaple -->
                    <!-- this div is made to hold columns of divs -->
                    <!-- insert divs of 3 items  in a rows-->
                    <div style="display: flex; flex-direction: row; align-items: center; justify-content: center;">
                        <p>item1</p>
                        <p>item2</p>
                        <p>item3</p>
                    </div>
                </div>
            </div>
         </div>
         <div id="bottom-bar">
            <p>song playing...</p>
         </div>
    </body>
    <script src="./js/main.js"></script>
</html>
