<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./css/main.css" rel="stylesheet">
        <title>Karaokie Kiosk</title>
    </head>
    <body>
        <header class="site-header">
            <div id="top-bar">
                <button id="fx">FX</button>
                <div id="center-buttons">
                    <button id="musicBtn" class="musicBtn">music</button>
                    <button id="menuBtn" class="menuBtn">menu</button>
                </div>
                <button id="help">Help</button>
            </div>
        </header>
        <div id="fx-overlay">
            <p>Pick an effect:</p>
            <p>
                <button id="fx1">fx1</button>
                <button id="fx2">fx2</button>
                <button id="fx3">fx3</button>
            </p>
        </div>
        <div id="help-overlay">
            <p>Call a server?</p>
            <p>
                <button id="help-yes">Yes</button>
                <button id="help-no">No</button>
            </p>
        </div>
         <div id="main-content">
            <div id ="music-tab" >
                <div id="music-block-titles">
                    <h1>Queue</h1>
                    <h1>Catalog</h1>
                </div>
                <div id="music-blocks">
                    <div id="queue-block"></div>
                    <div id="catalog-block">
                        <div id="search-container">
                            <input id="searchbar" 
                                onkeyup="searchSongs()" 
                                type="text" name="search" 
                                placeholder="Search songs...">
                            <button id="clear-btn" onclick="clearSearch()">✕</button>
                        </div>
                        <!-- <button id="genre-back">back</button> -->
                        <div id="recs"></div>
                    </div>
                </div>
            </div>
            <!-- to display food tab correctly need to set display to flex and not block -->
            <div id ="food-tab" style="display:none">
                <div id="food-block-titles">
                    <button onclick="displayMenuItems('food')">Food</button>
                    <button onclick="displayMenuItems('drink')">Drinks</button>
                    <button onclick="displayMenuItems('appetizer')">Appetizers</button>
                    <button onclick="displayMenuItems('special')">Specials</button>
                </div>
                <div id="food-block">
                    <!-- exmaple -->
                    <!-- this div is made to hold columns of divs -->
                    <!-- insert divs of 3 items  in a rows-->
                     
                    <div style="display: flex; flex-direction: row; align-items: center; justify-content: center;">
                        <p>item1</p>
                        <p>item2</p>
                        <p>item3</p>
                    </div>
                </div>
            </div>
         </div>
         <div id="bottom-bar">
            <div id="currentSong">
                <p id="songPlayingText">song playing...</p>
            </div>
            <div id="bottomBarBtns">
                <button id="playPauseBtn">
                    <img id="playBtnIcon" src="/media/play_btn.png" alt="play button"/>
                </button>
                <button id="nextBtn">
                    <img id="nextBtnIcon" src="/media/next_btn.png" alt="next button"/>
                </button>
            </div>
         </div>
    </body>
    <script src="./js/main.js"></script>
</html>
