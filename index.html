<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="./css/main.css" rel="stylesheet">
        <title>Karaoke Kiosk</title>
    </head>
    <body>
        <header class="site-header">
            <div id="session-timer">2:00:00</div>
            <div id="top-bar">
                <button id="fx">FX</button>
                <div id="center-buttons">
                    <button id="musicBtn" class="musicBtn">music</button>
                    <button id="menuBtn" class="menuBtn">menu</button>
                </div>
                <button id="help">Help</button>
            </div>
        </header>
        <div id="fx-overlay">
            <p>Pick an effect:</p>
            <p>
                <button id="fx1" style="color: white;">fx1</button>
                <button id="fx2" style="color: white;">fx2</button>
                <button id="fx3" style="color: white;">fx3</button>
            </p>
        </div>
        <div id="help-overlay">
            <p>Call a server?</p>
            <p>
                <button id="help-yes" style="color: white;">Yes</button>
                <button id="help-no" style="color: white;">No</button>
            </p>
        </div>
         <div id="main-content">
            <div id ="music-tab" >
                <div id="music-block-titles">
                    <h1>Queue</h1>
                    <h1>Catalog</h1>
                </div>
                <div id="music-blocks">
                    <div id="queue-block"></div>
                    <div id="catalog-block">
                        <div id="search-container">
                            <input id="searchbar" 
                                onkeyup="searchSongs()" 
                                type="text" name="search" 
                                placeholder="Search songs...">
                            <button id="clear-btn" onclick="clearSearch()">✕</button>
                        </div>
                        <!-- <button id="genre-back">back</button> -->
                        <div id="recs"></div>
                    </div>
                </div>
            </div>
            <!-- to display food tab correctly need to set display to flex and not block -->
            <div id ="food-tab" style="display:none">
                <div id="food-block-titles">
                    <button onclick="displayMenuItems('food')" id="foodBtn" class="foodBtn">Food</button>
                    <button onclick="displayMenuItems('drink')" id="drinkBtn" class="drinkBtn">Drinks</button>
                    <button onclick="displayMenuItems('appetizer')" id="appetizerBtn" class="appetizerBtn">Appetizers</button>
                    <button onclick="displayMenuItems('special')" id="specialBtn" class="specialBtn">Specials</button>
                </div>
                <div id="food-block">
                </div>
            </div>
         </div>

         <div id="progress-bar">
            <div id="progress-fill"></div>
         </div>

         <div id="bottom-bar">
            <div id="currentSong">
            </div>
            <div id="song-time">
                <span id="time-elapsed">0:00</span>
                <span> / </span>
                <span id="time-total"> 0:00</span>
            </div>
            <div id="bottomBarBtns">
                <button id="playPauseBtn">
                    <img id="playBtnIcon" src="/media/play_btn.png" alt="play button"/>
                </button>
                <button id="nextBtn">
                    <img id="nextBtnIcon" src="/media/next_btn.png" alt="next button"/>
                </button>
            </div>
         </div>
    </body>
    <script src="./js/main.js"></script>
</html>
